name: Move Training Connect Card

on:
  push:
    branches:
      - agent/fix-ranking-auth-flow
    paths:
      - "scripts/move_training_connect_card.py"
      - ".github/workflows/move-training-connect-card.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply layout patch
        run: python scripts/move_training_connect_card.py

      - name: Remove one-time files
        run: rm scripts/move_training_connect_card.py .github/workflows/move-training-connect-card.yml

      - name: Commit layout patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move Discord connection prompt above training intro"
          git push origin HEAD:agent/fix-ranking-auth-flow
