name: Apply Pixi Background Refactor Once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply background refactor
        run: node scripts/apply-pixi-background-view-refactor.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "actions"
          git config user.email "actions@example.com"
          git add apps/web/src/game-client/pixi/createPixiGame.ts
          git commit -m "Apply Pixi background view refactor"
          git pull --rebase origin main
          git push
