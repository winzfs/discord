name: Apply Game Run Submission Once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply game run submission patch
        run: node scripts/add-game-run-submission.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "actions"
          git config user.email "actions@example.com"
          git add apps/web/src/game-client/pixi/createPixiGame.ts
          git commit -m "Apply game run submission to Pixi client"
          git pull --rebase origin main
          git push
