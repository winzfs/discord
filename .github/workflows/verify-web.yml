name: Verify Web

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/**"
      - "docs/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/verify-web.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/verify-web.yml"
  workflow_dispatch:

jobs:
  verify-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck 2>&1 | tee typecheck.log

      - name: Build web
        run: pnpm build:web 2>&1 | tee build-web.log

      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-verification-diagnostics
          path: |
            typecheck.log
            build-web.log
          if-no-files-found: ignore
          retention-days: 1
