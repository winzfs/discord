name: Generate SDK Lockfile

on:
  push:
    branches:
      - agent/discord-training-identity

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore locked dependency versions
        run: |
          git show origin/main:apps/web/package.json > apps/web/package.json
          git show origin/main:pnpm-lock.yaml > pnpm-lock.yaml

      - name: Add only the Discord SDK
        run: pnpm --filter @discord-random-defense/web add @discord/embedded-app-sdk@2.5.0 --lockfile-only

      - name: Commit generated files
        run: |
          if git diff --quiet -- apps/web/package.json pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/package.json pnpm-lock.yaml
          git commit -m "Lock Discord Embedded App SDK dependency"
          git push origin HEAD:agent/discord-training-identity
