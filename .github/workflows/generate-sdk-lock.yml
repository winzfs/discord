name: Generate SDK Lockfile

on:
  push:
    branches:
      - agent/discord-training-identity
  pull_request:
    branches:
      - main

jobs:
  generate-lockfile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore locked dependency versions
        run: |
          git show origin/main:apps/web/package.json > apps/web/package.json
          git show origin/main:pnpm-lock.yaml > pnpm-lock.yaml

      - name: Add only the Discord SDK
        run: pnpm --filter @discord-random-defense/web add @discord/embedded-app-sdk@2.5.0 --lockfile-only

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: generated-sdk-lock
          path: |
            apps/web/package.json
            pnpm-lock.yaml
          if-no-files-found: error
