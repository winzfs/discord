name: Apply Unit Info Fix Once

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/apply-pixi-unit-info-and-dismiss.mjs
      - run: git diff -- apps/web/src/game-client/pixi/createPixiGame.ts
      - run: |
          git config user.name actions
          git config user.email actions@example.com
          git add apps/web/src/game-client/pixi/createPixiGame.ts
          git diff --cached --quiet || git commit -m unit-info-fix
          git push
